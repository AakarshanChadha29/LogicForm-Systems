<svg width="292" height="58" viewBox="0 0 292 58" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logicformLogoTitle logicformLogoDesc">
  <title id="logicformLogoTitle">Logicform Systems logo</title>
  <desc id="logicformLogoDesc">A premium Logicform Systems logo with a structured LF mark and refined wordmark.</desc>
  <defs>
    <linearGradient id="markBorder" x1="6" y1="3" x2="43" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0A8"/>
      <stop offset="0.42" stop-color="#D7B64A"/>
      <stop offset="1" stop-color="#8F6F16"/>
    </linearGradient>
    <linearGradient id="markGold" x1="12" y1="10" x2="34" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6C9"/>
      <stop offset="0.55" stop-color="#D8B852"/>
      <stop offset="1" stop-color="#A78322"/>
    </linearGradient>
    <linearGradient id="markGlass" x1="9" y1="6" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12110D"/>
      <stop offset="1" stop-color="#050504"/>
    </linearGradient>
    <linearGradient id="wordGold" x1="57" y1="13" x2="194" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9E5"/>
      <stop offset="1" stop-color="#D7B64A"/>
    </linearGradient>
    <filter id="markGlow" x="-24%" y="-24%" width="148%" height="148%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.8" flood-color="#D7B64A" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <g filter="url(#markGlow)">
    <rect x="2.5" y="5.5" width="43" height="43" rx="13.5" fill="url(#markGlass)" stroke="url(#markBorder)" stroke-width="1.4"/>
    <path d="M12.4 15.3H16.8V34.4H28.8V38.7H12.4V15.3Z" fill="url(#markGold)"/>
    <path d="M21.2 15.3H35.9V19.5H25.8V25.3H34.1V29.4H25.8V38.7H21.2V15.3Z" fill="#FBF7EC"/>
    <path d="M10.6 26.7H37.4" stroke="#D7B64A" stroke-opacity="0.38" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M31.5 35.1H36.1" stroke="#D7B64A" stroke-width="1.35" stroke-linecap="round"/>
    <circle cx="36.6" cy="37.9" r="2.35" fill="#F2D36B"/>
    <circle cx="36.6" cy="37.9" r="4.8" stroke="#D7B64A" stroke-opacity="0.16"/>
  </g>

  <text x="58" y="28" fill="url(#wordGold)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="760">Logicform</text>
  <text x="161" y="28" fill="#E6DDC8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="520">Systems</text>
  <path d="M59 36H227" stroke="#D7B64A" stroke-opacity="0.34" stroke-linecap="round"/>
  <text x="58" y="48" fill="#9F978A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="650" letter-spacing="0.22em">DIGITAL SYSTEMS STUDIO</text>
  <circle cx="239" cy="36" r="2" fill="#D7B64A" fill-opacity="0.78"/>
  <circle cx="250" cy="36" r="2" fill="#D7B64A" fill-opacity="0.42"/>
  <circle cx="261" cy="36" r="2" fill="#D7B64A" fill-opacity="0.2"/>
