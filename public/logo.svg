    <path d="M10.25 21H31.75" stroke="#D4AF37" stroke-opacity="0.42" stroke-width="1" stroke-linecap="round"/>
    <circle cx="32" cy="30.2" r="2.15" fill="#F5D76E"/>
  </g>

  <text x="54" y="27" fill="#F8F5EC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="720" letter-spacing="-0.045em">Logicform</text>
  <text x="151" y="27" fill="#C8BFAE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="520" letter-spacing="-0.035em">Systems</text>
  <path d="M54 33.5H194" stroke="#D4AF37" stroke-opacity="0.26" stroke-linecap="round"/>
