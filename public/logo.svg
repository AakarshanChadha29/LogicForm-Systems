<svg width="248" height="42" viewBox="0 0 248 42" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logicformLogoTitle logicformLogoDesc">
  <title id="logicformLogoTitle">Logicform Systems logo</title>
  <desc id="logicformLogoDesc">A premium black and gold Logicform Systems wordmark with a structured LF monogram.</desc>
  <defs>
    <linearGradient id="gold" x1="7" y1="4" x2="36" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5D76E"/>
      <stop offset="0.42" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#9E7C18"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="13" y1="10" x2="30" y2="33" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2B8"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#D4AF37" flood-opacity="0.28"/>
    </filter>
  </defs>

