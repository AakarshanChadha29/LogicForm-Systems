<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logicformMarkTitle logicformMarkDesc">
  <title id="logicformMarkTitle">Logicform Systems mark</title>
  <desc id="logicformMarkDesc">A bold geometric systems mark for Logicform Systems, built from an architectural gold circuit form.</desc>
  <defs>
    <linearGradient id="markBorder" x1="5" y1="3" x2="43" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4BB"/>
      <stop offset="0.48" stop-color="#D8B852"/>
      <stop offset="1" stop-color="#806316"/>
    </linearGradient>
    <linearGradient id="markGold" x1="10" y1="8" x2="37" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6C9"/>
      <stop offset="0.46" stop-color="#D9B85A"/>
      <stop offset="1" stop-color="#9B781E"/>
    </linearGradient>
    <linearGradient id="markGlass" x1="8" y1="5" x2="41" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16140F"/>
      <stop offset="0.52" stop-color="#090807"/>
      <stop offset="1" stop-color="#030303"/>
    </linearGradient>
    <filter id="markGlow" x="-22%" y="-22%" width="144%" height="144%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#D7B64A" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g filter="url(#markGlow)">
    <rect x="2.5" y="2.5" width="43" height="43" rx="12.5" fill="url(#markGlass)" stroke="url(#markBorder)" stroke-width="1.35"/>
    <path fill-rule="evenodd" clip-rule="evenodd" d="M14.2 10.8H30.6L37.2 17.4V31.1L30.4 37.8H14.2L9.8 33.4V15.2L14.2 10.8ZM15.9 16V32.3H28.3L32.4 28.2V20.3L28.2 16H15.9Z" fill="url(#markGold)"/>
    <path d="M18.6 24.1H31.8" stroke="#FBF7EC" stroke-width="2.15" stroke-linecap="square"/>
    <path d="M23.8 32.1L32 16.3" stroke="#FBF7EC" stroke-opacity="0.86" stroke-width="2.15" stroke-linecap="square"/>
    <path d="M15.9 16H28.2L32.4 20.3" stroke="#FFF4BB" stroke-opacity="0.44" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/>
    <circle cx="15.9" cy="16" r="1.45" fill="#FFF1A7"/>
    <circle cx="31.8" cy="24.1" r="1.45" fill="#FFF1A7"/>
    <circle cx="23.8" cy="32.1" r="1.45" fill="#C8A84C"/>
  </g>
</svg>
